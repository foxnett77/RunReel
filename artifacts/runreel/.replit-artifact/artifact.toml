kind = "web"
previewPath = "/"
title = "RunReel"
version = "1.0.0"
id = "artifacts/runreel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23627

[services.development]
run = "pnpm --filter @workspace/runreel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/runreel", "run", "build" ]
publicDir = "artifacts/runreel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23627"
BASE_PATH = "/"
